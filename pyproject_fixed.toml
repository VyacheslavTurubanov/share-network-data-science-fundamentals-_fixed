[tool.poetry]
name = "sql-tutorial"
version = "0.1.0"
description = "Fixed local environment for the Share Network SQL/Pandas lecture notebooks"
authors = ["Amity Aharoni <amity@share-network.org>"]
readme = "README.md"
package-mode = false

[tool.poetry.dependencies]
python = ">=3.11,<3.13"
pandas = "^2.2.3"
openpyxl = "^3.1.5"
jinja2 = "^3.1.6"
matplotlib = "^3.9.2"
seaborn = "^0.13.2"
scikit-learn = "^1.5.2"
numpy = "^2.1.2"
jupyter = "^1.1.1"
notebook = "^7.2.2"
ipykernel = "^6.29.5"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
